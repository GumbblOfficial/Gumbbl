<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GUMBBL</title>
    <style>
        body {
            background-color: black;
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        h1 {
            text-align: center;
            margin-top: 50px;
            font-size: 48px;
        }
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 80vh;
        }
        .game-box {
            background-image: url('https://via.placeholder.com/600x400'); /* Reemplaza esta URL con la imagen de tu juego */
            background-size: cover;
            background-position: center;
            width: 600px;
            height: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(255, 255, 255, 0.2);
        }
        button {
            background-color: white;
            color: black;
            border: none;
            padding: 15px 30px;
            font-size: 20px;
            cursor: pointer;
            border-radius: 5px;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #ddd;
        }
    </style>
</head>
<body>
    <h1>GUMBBL</h1>
    <div class="container">
        <div class="game-box">
            <button id="playButton">Play</button>
        </div>
    </div>

    <script>
        document.getElementById('playButton').addEventListener('click', function() {
            window.location.href = 'game.html'; // Redirige a la página del juego
        });
    </script>
</body>
</html>
